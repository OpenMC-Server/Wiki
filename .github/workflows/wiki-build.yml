name: Wiki Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build Wiki
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: latest

      - name: Install Retype CLI
        run: npm install retypeapp --global

      - name: Build Wiki
        run: retype build --output public

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: public
          path: public/
